<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background -->
  <rect width="180" height="180" fill="black"/>

  <!-- First M: white -->
  <text x="30" y="110" font-family="Arial, sans-serif" font-size="72" fill="white">M</text>

  <!-- Second M: bright blue -->
